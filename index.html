<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Letter Tracer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0d1f;
      --panel:   #1a1a35;
      --accent:  #ff2d78;
      --gold:    #ffd600;
      --green:   #00e676;
      --orange:  #ff9100;
      --purple:  #bb86fc;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: #fff;
      font-family: 'Arial Black', 'Helvetica Neue', Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      touch-action: none;
    }

    /* ── Top bar ── */
    #topbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: var(--panel);
      border-bottom: 3px solid var(--accent);
      flex-shrink: 0;
    }

    #app-title {
      font-size: 1rem;
      font-weight: 900;
      color: var(--accent);
      letter-spacing: 2px;
      margin-right: auto;
      white-space: nowrap;
    }

    .btn {
      background: var(--panel);
      border: 2px solid var(--accent);
      color: #fff;
      border-radius: 10px;
      padding: 7px 13px;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 900;
      cursor: pointer;
      touch-action: manipulation;
      transition: transform 0.1s;
      white-space: nowrap;
    }
    .btn:active { transform: scale(0.93); }

    #case-btn {
      border-color: var(--orange);
      color: var(--orange);
      min-width: 48px;
    }

    #nav {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .arrow-btn {
      background: none;
      border: none;
      color: #fff;
      font-size: 1.4rem;
      cursor: pointer;
      padding: 4px 6px;
      touch-action: manipulation;
      line-height: 1;
    }
    .arrow-btn:active { opacity: 0.5; }

    #letter-display {
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--gold);
      min-width: 36px;
      text-align: center;
      cursor: pointer;
      line-height: 1;
    }

    /* ── Canvas area ── */
    #canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      touch-action: none;
    }

    canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: block;
    }
    #guide-canvas { z-index: 1; }
    #draw-canvas  { z-index: 2; }

    /* ── Bottom bar ── */
    #bottombar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: var(--panel);
      border-top: 3px solid var(--accent);
      flex-shrink: 0;
    }

    #stars-display {
      font-size: 1.2rem;
      letter-spacing: 1px;
      min-width: 30px;
    }

    #size-ctrl {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }
    .size-btn {
      padding: 7px 11px;
      font-size: 1.1rem;
      border-color: var(--purple);
      color: var(--purple);
      min-width: 36px;
    }
    .size-btn:disabled {
      opacity: 0.3;
      cursor: default;
    }
    #mode-btn {
      border-color: #40c4ff;
      color: #40c4ff;
      flex-shrink: 0;
    }

    #progress-wrap {
      flex: 1;
    }
    #progress-bg {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      height: 14px;
      overflow: hidden;
    }
    #progress-bar {
      background: linear-gradient(90deg, var(--green), #69ff47);
      height: 100%;
      width: 0%;
      border-radius: 8px;
      transition: width 0.08s ease;
      box-shadow: 0 0 8px var(--green);
    }

    /* ── Letter grid overlay ── */
    #grid-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 50;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 20px;
    }
    #grid-overlay.open { display: flex; }

    #grid-overlay h2 {
      color: var(--gold);
      font-size: 1.1rem;
      letter-spacing: 3px;
    }

    #letter-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      width: 100%;
      max-width: 380px;
    }

    .letter-pick-btn {
      background: var(--panel);
      border: 2px solid rgba(255,255,255,0.15);
      color: #fff;
      border-radius: 8px;
      padding: 10px 0;
      font-size: 1.1rem;
      font-weight: 900;
      font-family: inherit;
      cursor: pointer;
      touch-action: manipulation;
      text-align: center;
    }
    .letter-pick-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .letter-pick-btn:active { transform: scale(0.9); }

    /* ── Celebration overlay ── */
    #celebration-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 60;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    #celebration-overlay.active { display: flex; }

    #celebration-msg {
      font-size: clamp(2.5rem, 12vw, 5rem);
      font-weight: 900;
      color: var(--gold);
      text-shadow: 0 0 30px var(--accent), 0 0 60px var(--accent);
      animation: celebPop 0.5s cubic-bezier(0.175,0.885,0.32,1.275) forwards;
    }

    @keyframes celebPop {
      0%   { transform: scale(0) rotate(-10deg); opacity: 0; }
      70%  { transform: scale(1.15) rotate(3deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    /* ── Confetti ── */
    #confetti-container {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 55;
      overflow: hidden;
    }

    .confetti-piece {
      position: absolute;
      top: -20px;
      border-radius: 2px;
      animation: confettiFall linear forwards;
    }

    @keyframes confettiFall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      80%  { opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* ── Pulse hint (start dot) ── */
    .start-pulse {
      position: absolute;
      border-radius: 50%;
      background: var(--accent);
      pointer-events: none;
      z-index: 3;
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50%       { transform: scale(1.5); opacity: 0.4; }
    }
  </style>
</head>
<body>

<!-- Top bar -->
<div id="topbar">
  <div id="app-title">LETTER TRACER</div>
  <button class="btn" id="case-btn" onclick="toggleCase()">Aa</button>
  <div id="nav">
    <button class="arrow-btn" onclick="prevLetter()">◀</button>
    <div id="letter-display" onclick="openGrid()" title="Pick a letter">A</div>
    <button class="arrow-btn" onclick="nextLetter()">▶</button>
  </div>
</div>

<!-- Canvas area -->
<div id="canvas-wrap">
  <canvas id="guide-canvas"></canvas>
  <canvas id="draw-canvas"></canvas>
  <div id="start-hint"></div>
</div>

<!-- Bottom bar -->
<div id="bottombar">
  <div id="stars-display"></div>
  <div id="size-ctrl">
    <button class="btn size-btn" onclick="adjustSize(-1)">−</button>
    <button class="btn size-btn" onclick="adjustSize(+1)">+</button>
  </div>
  <button class="btn" id="mode-btn" onclick="toggleMode()">Lines</button>
  <div id="progress-wrap">
    <div id="progress-bg">
      <div id="progress-bar"></div>
    </div>
  </div>
  <button class="btn" onclick="clearDrawing()">Clear</button>
</div>

<!-- Letter grid overlay -->
<div id="grid-overlay" onclick="if(event.target===this)closeGrid()">
  <h2>PICK A LETTER</h2>
  <div id="letter-grid"></div>
  <button class="btn" onclick="closeGrid()" style="margin-top:4px">Close</button>
</div>

<!-- Celebration overlay -->
<div id="celebration-overlay">
  <div id="celebration-msg">Amazing!</div>
</div>

<!-- Confetti container -->
<div id="confetti-container"></div>

<script>
// ─── Constants ───────────────────────────────────────────
const ALPHABET        = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
const COVER_THRESHOLD = 0.78;    // fraction of waypoints the child must visit
const STROKE_CSS      = 15;      // drawing stroke width (CSS px)
const DETECT_RADIUS   = 25;      // waypoint-hit radius (CSS px)
const CELEB_MESSAGES  = ['Amazing!','Great job!','Perfect!','Awesome!','You did it!','Superstar!'];

// ─── Letter paths (0–100 × 0–100 coordinate space) ───────
// Uppercase — each letter as a single SVG path string (multiple sub-paths via M)
const PATHS_UC = {
  A: 'M50,5 L8,95 M50,5 L92,95 M22,62 L78,62',
  B: 'M20,5 L20,95 M20,5 Q72,5 72,27 Q72,50 20,50 M20,50 Q76,50 76,72 Q76,95 20,95',
  C: 'M85,18 Q82,5 50,5 Q8,5 8,50 Q8,95 50,95 Q82,95 85,82',
  D: 'M20,5 L20,95 M20,5 Q88,5 88,50 Q88,95 20,95',
  E: 'M78,5 L20,5 L20,95 L78,95 M20,50 L68,50',
  F: 'M78,5 L20,5 L20,95 M20,50 L68,50',
  G: 'M85,18 Q82,5 50,5 Q8,5 8,50 Q8,95 50,95 Q82,95 85,82 L85,52 L54,52',
  H: 'M20,5 L20,95 M80,5 L80,95 M20,50 L80,50',
  I: 'M35,5 L65,5 M50,5 L50,95 M35,95 L65,95',
  J: 'M72,5 L72,72 Q72,95 50,95 Q25,95 25,78',
  K: 'M20,5 L20,95 M20,50 L80,5 M20,50 L80,95',
  L: 'M20,5 L20,95 L80,95',
  M: 'M12,95 L12,5 L50,52 L88,5 L88,95',
  N: 'M20,95 L20,5 L80,95 L80,5',
  O: 'M50,5 Q8,5 8,50 Q8,95 50,95 Q92,95 92,50 Q92,5 50,5',
  P: 'M20,5 L20,95 M20,5 Q78,5 78,27 Q78,50 20,50',
  Q: 'M50,5 Q8,5 8,50 Q8,95 50,95 Q92,95 92,50 Q92,5 50,5 M63,73 L90,96',
  R: 'M20,5 L20,95 M20,5 Q78,5 78,27 Q78,50 20,50 M48,50 L85,95',
  S: 'M82,18 Q82,5 50,5 Q12,5 12,28 Q12,50 50,50 Q88,50 88,72 Q88,95 50,95 Q18,95 18,82',
  T: 'M8,5 L92,5 M50,5 L50,95',
  U: 'M20,5 L20,68 Q20,95 50,95 Q80,95 80,68 L80,5',
  V: 'M8,5 L50,95 L92,5',
  W: 'M5,5 L28,95 L50,55 L72,95 L95,5',
  X: 'M8,5 L92,95 M92,5 L8,95',
  Y: 'M8,5 L50,50 L92,5 M50,50 L50,95',
  Z: 'M8,5 L92,5 L8,95 L92,95',
};

// Lowercase — x-height sits roughly y 28–82; ascenders reach y 5; descenders reach y 95
const PATHS_LC = {
  a: 'M78,35 Q78,18 50,18 Q18,18 18,52 Q18,82 50,82 Q78,82 78,52 L78,82',
  b: 'M22,5 L22,82 M22,55 Q22,18 50,18 Q80,18 80,50 Q80,82 50,82 Q22,82 22,65',
  c: 'M80,35 Q80,18 50,18 Q18,18 18,50 Q18,82 50,82 Q80,82 80,65',
  d: 'M78,5 L78,82 M78,55 Q78,18 50,18 Q18,18 18,50 Q18,82 50,82 Q78,82 78,65',
  e: 'M18,48 L82,48 Q82,18 50,18 Q18,18 18,50 Q18,82 50,82 Q80,82 80,65',
  f: 'M72,8 Q58,3 52,18 L52,82 M32,40 L68,40',
  g: 'M78,28 Q78,12 50,12 Q20,12 20,42 Q20,68 50,68 Q78,68 78,42 L78,80 Q78,97 50,97 Q30,97 28,88',
  h: 'M20,5 L20,82 M20,48 Q20,18 50,18 Q80,18 80,48 L80,82',
  i: 'M50,8 L50,17 M50,27 L50,82',
  j: 'M60,8 L60,17 M60,27 L60,82 Q60,97 40,97 Q25,97 25,88',
  k: 'M20,5 L20,82 M20,48 L72,18 M42,40 L78,82',
  l: 'M50,5 L50,82',
  m: 'M15,28 L15,82 M15,50 Q15,18 40,18 Q58,18 58,48 M58,50 Q58,18 78,18 Q90,18 90,48 L90,82',
  n: 'M20,28 L20,82 M20,50 Q20,18 50,18 Q80,18 80,48 L80,82',
  o: 'M50,18 Q18,18 18,50 Q18,82 50,82 Q82,82 82,50 Q82,18 50,18',
  p: 'M20,28 L20,97 M20,52 Q20,18 50,18 Q80,18 80,50 Q80,82 50,82 Q20,82 20,65',
  q: 'M80,28 L80,97 M80,52 Q80,18 50,18 Q20,18 20,50 Q20,82 50,82 Q80,82 80,65',
  r: 'M20,28 L20,82 M20,48 Q20,24 55,20 L68,18',
  s: 'M78,32 Q78,18 50,18 Q18,18 18,38 Q18,55 50,55 Q82,55 82,70 Q82,82 50,82 Q22,82 22,70',
  t: 'M50,5 L50,82 M28,32 L68,32',
  u: 'M20,28 L20,65 Q20,82 50,82 Q80,82 80,65 L80,28',
  v: 'M15,28 L50,82 L85,28',
  w: 'M10,28 L30,82 L50,55 L70,82 L90,28',
  x: 'M15,20 L85,82 M85,20 L15,82',
  y: 'M15,28 L50,68 L85,28 M50,68 L36,90 Q26,97 15,97',
  z: 'M15,20 L85,20 L15,82 L85,82',
};

// ─── State ───────────────────────────────────────────────
let letterIndex   = 0;
let isUppercase   = true;
let isLineMode    = true;   // true = single-stroke paths, false = block letters
let totalStars    = 0;
let celebrated    = false;
const SIZE_STEPS  = [0.30, 0.38, 0.46, 0.54, 0.62, 0.70, 0.78];
let sizeStepIndex = 4;
let isDrawing     = false;
let lastX = 0, lastY = 0;

// Line-mode coverage (waypoint proximity)
let waypoints        = [];
let visitedWaypoints = new Set();

// Block-mode coverage (pixel buckets)
const GRID_SIZE    = 38;
let pixelData      = null;
let letterBuckets  = new Set();
let coveredBuckets = new Set();
let mapWidth = 0, mapHeight = 0;

// ─── Canvas setup ────────────────────────────────────────
const guideCanvas = document.getElementById('guide-canvas');
const drawCanvas  = document.getElementById('draw-canvas');
const guideCtx    = guideCanvas.getContext('2d');
const drawCtx     = drawCanvas.getContext('2d');
const dpr         = Math.min(window.devicePixelRatio || 1, 3);

// ─── Init ─────────────────────────────────────────────────
function init() {
  buildLetterGrid();
  adjustSize(0); // set initial disabled states
  resize();
  window.addEventListener('resize', debounce(resize, 120));

  drawCanvas.addEventListener('touchstart', onTouchStart, { passive: false });
  drawCanvas.addEventListener('touchmove',  onTouchMove,  { passive: false });
  drawCanvas.addEventListener('touchend',   onTouchEnd,   { passive: false });
  drawCanvas.addEventListener('mousedown',  e => startDraw(mousePos(e)));
  drawCanvas.addEventListener('mousemove',  e => { if (isDrawing) contDraw(mousePos(e)); });
  window.addEventListener('mouseup', () => { isDrawing = false; });
}

function debounce(fn, ms) {
  let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
}

// ─── Resize ───────────────────────────────────────────────
function resize() {
  const wrap = document.getElementById('canvas-wrap');
  const w = wrap.clientWidth;
  const h = wrap.clientHeight;
  for (const c of [guideCanvas, drawCanvas]) {
    c.style.width  = w + 'px';
    c.style.height = h + 'px';
    c.width  = Math.round(w * dpr);
    c.height = Math.round(h * dpr);
  }
  renderLetter();
}

// ─── Current letter ───────────────────────────────────────
function getLetter() {
  return isUppercase ? ALPHABET[letterIndex] : ALPHABET[letterIndex].toLowerCase();
}

function getPathStr() {
  return isUppercase ? PATHS_UC[getLetter()] : PATHS_LC[getLetter()];
}

// Returns { ox, oy, scale } mapping 0-100 path space → physical canvas pixels
function letterTransform() {
  const W = guideCanvas.width, H = guideCanvas.height;
  const size = SIZE_STEPS[sizeStepIndex] * Math.min(W, H);
  return { ox: (W - size) / 2, oy: (H - size) / 2, scale: size / 100 };
}

// ─── Render guide ─────────────────────────────────────────
function renderLetter() {
  if (isLineMode) renderLetterLine();
  else            renderLetterBlock();
  document.getElementById('letter-display').textContent = getLetter();
  resetDrawing();
}

function renderLetterLine() {
  const W = guideCanvas.width, H = guideCanvas.height;
  const { ox, oy, scale } = letterTransform();
  const lw = Math.max(4 * dpr, scale * 0.055);

  guideCtx.clearRect(0, 0, W, H);

  const matrix = new DOMMatrix([scale, 0, 0, scale, ox, oy]);
  const p2d = new Path2D();
  p2d.addPath(new Path2D(getPathStr()), matrix);

  guideCtx.strokeStyle = 'rgba(255,214,0,0.85)';
  guideCtx.lineWidth   = lw;
  guideCtx.lineCap     = 'round';
  guideCtx.lineJoin    = 'round';
  guideCtx.setLineDash([lw * 1.2, lw * 2.0]);
  guideCtx.stroke(p2d);
  guideCtx.setLineDash([]);

  buildWaypoints();
  if (waypoints.length > 0) {
    const [wpx, wpy] = waypoints[0];
    placeStartHintAt(wpx / dpr, wpy / dpr);
  }
}

function renderLetterBlock() {
  const W = guideCanvas.width, H = guideCanvas.height;
  const fontSize = Math.min(W, H) * SIZE_STEPS[sizeStepIndex];
  const fontStr  = `bold ${fontSize}px 'Arial Black','Helvetica Neue',Arial,sans-serif`;

  guideCtx.font         = fontStr;
  guideCtx.textBaseline = 'alphabetic';
  const m    = guideCtx.measureText(getLetter());
  const tx   = (W - m.width) / 2;
  const ty   = (H - (m.actualBoundingBoxAscent + m.actualBoundingBoxDescent)) / 2
               + m.actualBoundingBoxAscent;

  guideCtx.clearRect(0, 0, W, H);

  guideCtx.save();
  guideCtx.globalAlpha  = 0.09;
  guideCtx.fillStyle    = '#ffffff';
  guideCtx.font         = fontStr;
  guideCtx.textBaseline = 'alphabetic';
  guideCtx.fillText(getLetter(), tx, ty);
  guideCtx.restore();

  guideCtx.save();
  guideCtx.font         = fontStr;
  guideCtx.textBaseline = 'alphabetic';
  guideCtx.strokeStyle  = 'rgba(255,214,0,0.7)';
  guideCtx.lineWidth    = Math.max(3, fontSize * 0.022);
  guideCtx.lineCap      = 'round';
  guideCtx.lineJoin     = 'round';
  guideCtx.setLineDash([fontSize * 0.028, fontSize * 0.052]);
  guideCtx.strokeText(getLetter(), tx, ty);
  guideCtx.restore();

  buildPixelMap(fontStr, tx, ty, W, H);
  placeStartHintAt(
    (tx + m.width * 0.08) / dpr,
    (ty - m.actualBoundingBoxAscent) / dpr
  );
}

// ─── Block-mode pixel map ─────────────────────────────────
function buildPixelMap(fontStr, tx, ty, W, H) {
  const off = document.createElement('canvas');
  off.width = W; off.height = H;
  const ctx = off.getContext('2d', { willReadFrequently: true });
  ctx.font = fontStr; ctx.textBaseline = 'alphabetic';
  ctx.fillStyle = '#ffffff';
  ctx.fillText(getLetter(), tx, ty);

  pixelData = ctx.getImageData(0, 0, W, H);
  mapWidth = W; mapHeight = H;
  letterBuckets.clear();

  const step = Math.max(1, Math.round(dpr * 1.5));
  for (let py = 0; py < H; py += step)
    for (let px = 0; px < W; px += step)
      if (pixelData.data[(py * W + px) * 4 + 3] > 60)
        letterBuckets.add(toBucket(px, py));
}

function toBucket(px, py) {
  const bx = Math.min(GRID_SIZE - 1, Math.floor(px * GRID_SIZE / mapWidth));
  const by = Math.min(GRID_SIZE - 1, Math.floor(py * GRID_SIZE / mapHeight));
  return by * GRID_SIZE + bx;
}

// ─── Waypoint map ─────────────────────────────────────────
function buildWaypoints() {
  const { ox, oy, scale } = letterTransform();
  const pathStr = getPathStr();

  // Use a hidden SVG element to sample points along the path
  const ns  = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;overflow:visible';
  document.body.appendChild(svg);
  const el = document.createElementNS(ns, 'path');
  el.setAttribute('d', pathStr);
  svg.appendChild(el);

  const totalLen = el.getTotalLength();
  // One waypoint roughly every 6 units in path space (≈ 6% of letter size)
  const numPts = Math.max(20, Math.ceil(totalLen / 6));
  waypoints = [];
  for (let i = 0; i <= numPts; i++) {
    const pt = el.getPointAtLength(totalLen * i / numPts);
    waypoints.push([ox + pt.x * scale, oy + pt.y * scale]);
  }

  document.body.removeChild(svg);
  visitedWaypoints = new Set();
}

// ─── Coverage detection ───────────────────────────────────
function markCoverage(cssX, cssY) {
  return isLineMode ? markCoverageLine(cssX, cssY) : markCoverageBlock(cssX, cssY);
}

function markCoverageLine(cssX, cssY) {
  const px = cssX * dpr, py = cssY * dpr;
  const r2 = (DETECT_RADIUS * dpr) ** 2;
  let onPath = false;
  for (let i = 0; i < waypoints.length; i++) {
    const dx = px - waypoints[i][0], dy = py - waypoints[i][1];
    const d2 = dx * dx + dy * dy;
    if (d2 <= r2) { visitedWaypoints.add(i); onPath = true; }
  }
  return onPath;
}

function markCoverageBlock(cssX, cssY) {
  const px  = cssX * dpr, py  = cssY * dpr;
  const r   = DETECT_RADIUS * dpr;
  const bx  = Math.floor(px * GRID_SIZE / mapWidth);
  const by  = Math.floor(py * GRID_SIZE / mapHeight);
  const cW  = mapWidth  / GRID_SIZE, cH = mapHeight / GRID_SIZE;
  const br  = Math.ceil(r / Math.min(cW, cH)) + 1;
  for (let dy = -br; dy <= br; dy++)
    for (let dx = -br; dx <= br; dx++) {
      const tbx = bx + dx, tby = by + dy;
      if (tbx < 0 || tby < 0 || tbx >= GRID_SIZE || tby >= GRID_SIZE) continue;
      const b = tby * GRID_SIZE + tbx;
      if (letterBuckets.has(b)) coveredBuckets.add(b);
    }
  // On-letter check: sample nearby pixels
  const step = Math.max(2, Math.round(r / 7));
  for (let dy = -r; dy <= r; dy += step)
    for (let dx = -r; dx <= r; dx += step) {
      if (dx * dx + dy * dy > r * r || !pixelData) continue;
      const tx = Math.round(px + dx), ty = Math.round(py + dy);
      if (tx < 0 || ty < 0 || tx >= mapWidth || ty >= mapHeight) continue;
      if (pixelData.data[(ty * mapWidth + tx) * 4 + 3] > 60) return true;
    }
  return false;
}

function getCoverage() {
  if (isLineMode) return waypoints.length > 0 ? visitedWaypoints.size / waypoints.length : 0;
  return letterBuckets.size > 0 ? coveredBuckets.size / letterBuckets.size : 0;
}

// ─── Drawing ──────────────────────────────────────────────
function mousePos(e) {
  const r = drawCanvas.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}

function touchPos(e) {
  const r = drawCanvas.getBoundingClientRect();
  const t = e.touches[0] || e.changedTouches[0];
  return { x: t.clientX - r.left, y: t.clientY - r.top };
}

function startDraw({ x, y }) {
  isDrawing = true;
  lastX = x; lastY = y;
  paintSegment(x, y, x, y);
}

function contDraw({ x, y }) {
  paintSegment(lastX, lastY, x, y);
  lastX = x; lastY = y;
}

function paintSegment(x1, y1, x2, y2) {
  const onLetter = markCoverage(x2, y2);
  const color    = onLetter ? '#00e676' : '#ff9100';
  const lw       = STROKE_CSS * dpr;

  drawCtx.save();
  drawCtx.strokeStyle = color;
  drawCtx.fillStyle   = color;
  drawCtx.lineWidth   = lw;
  drawCtx.lineCap     = 'round';
  drawCtx.lineJoin    = 'round';
  drawCtx.shadowColor = color;
  drawCtx.shadowBlur  = 5 * dpr;

  if (x1 === x2 && y1 === y2) {
    drawCtx.beginPath();
    drawCtx.arc(x2 * dpr, y2 * dpr, lw / 2, 0, Math.PI * 2);
    drawCtx.fill();
  } else {
    drawCtx.beginPath();
    drawCtx.moveTo(x1 * dpr, y1 * dpr);
    drawCtx.lineTo(x2 * dpr, y2 * dpr);
    drawCtx.stroke();
  }
  drawCtx.restore();

  updateProgress();
}

// Touch handlers
function onTouchStart(e) { e.preventDefault(); startDraw(touchPos(e)); }
function onTouchMove(e)  { e.preventDefault(); if (isDrawing) contDraw(touchPos(e)); }
function onTouchEnd(e)   { e.preventDefault(); isDrawing = false; }

// ─── Progress & celebration ───────────────────────────────
function updateProgress() {
  const pct = Math.min(getCoverage() / COVER_THRESHOLD * 100, 100);
  document.getElementById('progress-bar').style.width = pct + '%';
  if (!celebrated && getCoverage() >= COVER_THRESHOLD) celebrate();
}

function celebrate() {
  celebrated = true;
  totalStars++;

  const shown = ((totalStars - 1) % 5) + 1;
  document.getElementById('stars-display').textContent = '⭐'.repeat(shown);

  spawnConfetti();

  const overlay = document.getElementById('celebration-overlay');
  document.getElementById('celebration-msg').textContent =
    CELEB_MESSAGES[Math.floor(Math.random() * CELEB_MESSAGES.length)];
  overlay.classList.add('active');
  setTimeout(() => overlay.classList.remove('active'), 1800);
}

function spawnConfetti() {
  const container = document.getElementById('confetti-container');
  container.innerHTML = '';
  const colors = ['#ff2d78','#ffd600','#00e676','#40c4ff','#ff9100','#bb86fc','#ffffff'];
  const shapes = ['2px', '50%'];   // square vs circle

  for (let i = 0; i < 55; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    const size = 6 + Math.random() * 10;
    el.style.cssText = `
      left:${8 + Math.random() * 84}%;
      width:${size}px; height:${size}px;
      background:${colors[Math.floor(Math.random() * colors.length)]};
      border-radius:${shapes[Math.floor(Math.random() * shapes.length)]};
      animation-delay:${(Math.random() * 0.35).toFixed(2)}s;
      animation-duration:${(0.75 + Math.random() * 0.75).toFixed(2)}s;
      transform:rotate(${Math.floor(Math.random() * 360)}deg);
    `;
    container.appendChild(el);
  }
  setTimeout(() => { container.innerHTML = ''; }, 2200);
}

// ─── Start hint (pulsing dot at path start) ───────────────
function placeStartHintAt(cssX, cssY) {
  const hint = document.getElementById('start-hint');
  hint.innerHTML = '';
  const wCss = guideCanvas.width  / dpr;
  const hCss = guideCanvas.height / dpr;
  const dot  = document.createElement('div');
  dot.className = 'start-pulse';
  const ds = Math.max(16, STROKE_CSS * 1.4);
  dot.style.cssText = `
    width:${ds}px; height:${ds}px;
    left:calc(${(cssX / wCss * 100).toFixed(1)}% - ${ds/2}px);
    top:calc(${(cssY / hCss * 100).toFixed(1)}% - ${ds/2}px);
  `;
  hint.appendChild(dot);
  setTimeout(() => { if (dot.parentNode) dot.remove(); }, 3000);
}

// ─── Controls ─────────────────────────────────────────────
function resetDrawing() {
  drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  visitedWaypoints = new Set();
  coveredBuckets.clear();
  celebrated = false;
  document.getElementById('progress-bar').style.width = '0%';
}

function toggleMode() {
  isLineMode = !isLineMode;
  const btn = document.getElementById('mode-btn');
  btn.textContent   = isLineMode ? 'Lines' : 'Blocks';
  btn.style.color   = isLineMode ? '#40c4ff' : 'var(--green)';
  btn.style.borderColor = btn.style.color;
  renderLetter();
}

function clearDrawing() {
  resetDrawing();
  if (waypoints.length > 0) {
    const [wpx, wpy] = waypoints[0];
    placeStartHintAt(wpx / dpr, wpy / dpr);
  }
}

function prevLetter() { letterIndex = (letterIndex - 1 + 26) % 26; renderLetter(); }
function nextLetter() { letterIndex = (letterIndex + 1) % 26;      renderLetter(); }

function adjustSize(delta) {
  sizeStepIndex = Math.max(0, Math.min(SIZE_STEPS.length - 1, sizeStepIndex + delta));
  document.querySelector('.size-btn:first-child').disabled = sizeStepIndex === 0;
  document.querySelector('.size-btn:last-child').disabled  = sizeStepIndex === SIZE_STEPS.length - 1;
  renderLetter();
}

function toggleCase() {
  isUppercase = !isUppercase;
  const btn = document.getElementById('case-btn');
  btn.textContent      = isUppercase ? 'Aa' : 'aA';
  btn.style.color      = isUppercase ? 'var(--orange)' : 'var(--purple)';
  btn.style.borderColor = btn.style.color;
  renderLetter();
}

function pickLetter(idx) {
  letterIndex = idx;
  closeGrid();
  renderLetter();
}

// ─── Letter grid ──────────────────────────────────────────
function buildLetterGrid() {
  const grid = document.getElementById('letter-grid');
  ALPHABET.split('').forEach((letter, i) => {
    const btn = document.createElement('button');
    btn.className = 'letter-pick-btn';
    btn.textContent = letter;
    btn.addEventListener('click', () => pickLetter(i));
    grid.appendChild(btn);
  });
}

function openGrid() {
  document.getElementById('grid-overlay').classList.add('open');
  document.querySelectorAll('.letter-pick-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === letterIndex);
  });
}

function closeGrid() {
  document.getElementById('grid-overlay').classList.remove('open');
}

// ─── Start ────────────────────────────────────────────────
init();
</script>
</body>
</html>
