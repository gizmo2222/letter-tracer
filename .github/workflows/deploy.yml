name: Deploy to metacrystal.com

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload via SFTP
        env:
          SSHPASS: ${{ secrets.SFTP_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass > /dev/null 2>&1
          sshpass -e sftp -o StrictHostKeyChecking=no \
            ${{ secrets.SFTP_USER }}@metacrystal.com <<'SFTP'
          put index.html /home/nstrupp/metacrystal.com/letter-tracer.html
          SFTP

      - name: Confirm
        run: echo "✅ Deployed index.html to metacrystal.com/letter-tracer.html"
